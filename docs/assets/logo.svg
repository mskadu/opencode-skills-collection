<svg xmlns="http://www.w3.org/2000/svg" width="300" height="100">
  <!-- Background -->
  <rect width="inherit" height="inherit" fill="#0a0a0a" rx="12"/>

  <!-- Icon: chevron terminale + accento teal -->
  <g transform="translate(24, 50)">
    <polyline points="0,-18 16,0 0,18"
      fill="none" stroke="#ffffff" stroke-width="3.5"
      stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="20" y1="18" x2="32" y2="18"
      stroke="#4ec9b0" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="76" y="46"
    font-family="'Geist', 'Inter', 'Segoe UI', sans-serif"
    font-size="26" font-weight="700" fill="#ffffff" letter-spacing="-0.5">
    OpenCode
  </text>

  <!-- Subtitle -->
  <text x="76" y="68"
    font-family="'Geist', 'Inter', 'Segoe UI', sans-serif"
    font-size="13" font-weight="400" fill="#aaaaaa" letter-spacing="1.5">
    SKILLS COLLECTION
  </text>

  <!-- Linea separatore accent -->
  <line x1="76" y1="52" x2="380" y2="52"
    stroke="#4ec9b0" stroke-width="0.5" opacity="0.3"/>
</svg>
